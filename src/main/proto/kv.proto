syntax = "proto3";

package kv;

option java_multiple_files = true;
option java_package = "com.vk.kv.proto";
option java_outer_classname = "KvProto";

import "google/protobuf/empty.proto";

service KvService {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Range(RangeRequest) returns (stream RangeEntry);
  rpc Count(google.protobuf.Empty) returns (CountResponse);
}

message NullableBytes {
  oneof kind {
    bytes data = 1;
    google.protobuf.Empty null_value = 2;
  }
}

message PutRequest {
  string key = 1;
  NullableBytes value = 2;
}

message PutResponse {}

message GetRequest {
  string key = 1;
}

message GetResponse {
  string key = 1;
  NullableBytes value = 2;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool deleted = 1;
}

message RangeRequest {
  string key_since = 1;
  string key_to = 2;
}

message RangeEntry {
  string key = 1;
  NullableBytes value = 2;
}

message CountResponse {
  int64 count = 1;
}